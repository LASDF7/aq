<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لياقة الشعر البدوي - المحاورة الفاخرة</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Reem+Kufi:wght@400;700&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Tajawal', 'Reem Kufi', sans-serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
    position: relative;
}

/* خلفية ذهبية متحركة */
.gold-particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #d4af37;
    border-radius: 50%;
    box-shadow: 0 0 10px #d4af37, 0 0 20px #d4af37, 0 0 30px #d4af37;
    animation: floatUp linear infinite;
    opacity: 0;
}

@keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

.container {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
}

/* ===== HEADER ===== */
.header {
    text-align: center;
    padding: 40px 0 30px;
    position: relative;
}

.header::before, .header::after {
    content: "✦";
    position: absolute;
    top: 20px;
    font-size: 20px;
    color: #d4af37;
    animation: sparkle 2s infinite alternate;
}

.header::before { left: 30%; }
.header::after { right: 30%; }

@keyframes sparkle {
    0% { opacity: 0.3; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.5); text-shadow: 0 0 20px #d4af37; }
}

.header h1 {
    font-family: 'Reem Kufi', sans-serif;
    font-size: 3.2rem;
    font-weight: 700;
    color: #d4af37;
    text-shadow: 0 0 30px rgba(212, 175, 55, 0.6), 0 0 60px rgba(212, 175, 55, 0.3);
    margin-bottom: 10px;
    letter-spacing: 2px;
}

.header h1 span {
    color: #fff;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
}

.header p {
    font-size: 1.2rem;
    color: #c0a060;
    font-weight: 400;
    letter-spacing: 1px;
}

/* ===== CARDS ===== */
.card {
    background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border: 2px solid #d4af37;
    border-radius: 20px;
    padding: 30px;
    margin: 25px 0;
    backdrop-filter: blur(15px);
    box-shadow: 
        0 0 20px rgba(212, 175, 55, 0.1),
        0 0 40px rgba(212, 175, 55, 0.05),
        inset 0 0 60px rgba(212, 175, 55, 0.02);
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #d4af37, #fff, #d4af37, transparent);
    animation: shimmer 3s infinite;
}

@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

.card-title {
    font-family: 'Reem Kufi', sans-serif;
    font-size: 1.4rem;
    color: #d4af37;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
}

.card-title::before {
    content: "◆";
    color: #d4af37;
    font-size: 1rem;
    animation: rotate 4s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* ===== TIMER GRID ===== */
.timer-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

.timer-btn {
    background: linear-gradient(145deg, rgba(212, 175, 55, 0.1), rgba(212, 175, 55, 0.05));
    border: 2px solid rgba(212, 175, 55, 0.4);
    color: #d4af37;
    padding: 14px 8px;
    border-radius: 14px;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
}

.timer-btn::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    background: rgba(212, 175, 55, 0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.4s, height 0.4s;
}

.timer-btn:hover::after {
    width: 200px;
    height: 200px;
}

.timer-btn:hover {
    border-color: #d4af37;
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    transform: translateY(-3px);
}

.timer-btn.selected {
    background: linear-gradient(145deg, #d4af37, #b8941f);
    color: #0a0a0a;
    border-color: #d4af37;
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.5), 0 0 60px rgba(212, 175, 55, 0.2);
    font-weight: 900;
}

/* ===== TOPIC DISPLAY ===== */
.topic-display {
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), rgba(255, 255, 255, 0.02));
    border: 2px solid rgba(212, 175, 55, 0.4);
    border-radius: 18px;
    padding: 30px;
    text-align: center;
    margin: 20px 0;
    position: relative;
    overflow: hidden;
}

.topic-display::before {
    content: '"';
    position: absolute;
    top: -15px;
    right: 25px;
    font-size: 100px;
    color: rgba(212, 175, 55, 0.15);
    font-family: 'Amiri', serif;
    line-height: 1;
}

.topic-text {
    font-family: 'Reem Kufi', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: #d4af37;
    line-height: 1.8;
    text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
}

/* ===== AI RESPONSE ===== */
.ai-response {
    background: linear-gradient(145deg, rgba(0,0,0,0.4), rgba(212, 175, 55, 0.05));
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 18px;
    padding: 25px;
    margin: 20px 0;
    position: relative;
}

.ai-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(145deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
    color: #d4af37;
    padding: 6px 16px;
    border-radius: 25px;
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 15px;
    border: 1px solid rgba(212, 175, 55, 0.3);
}

.ai-label::before { content: "🐪"; font-size: 1.2rem; }

.ai-verse {
    font-size: 1.4rem;
    line-height: 2.2;
    color: #f0e6d2;
    font-family: 'Amiri', serif;
    margin: 15px 0;
    text-align: center;
}

/* ===== TIMER CIRCLE ===== */
.timer-circle-container {
    text-align: center;
    margin: 25px 0;
}

.timer-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid rgba(212, 175, 55, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    position: relative;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.1), rgba(0,0,0,0.3));
    transition: all 0.3s;
}

.timer-circle::before {
    content: "";
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #d4af37;
    border-right-color: #d4af37;
    animation: spin 2s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.timer-circle.warning {
    border-color: #ffc107;
    box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
}

.timer-circle.danger {
    border-color: #e74c3c;
    box-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
    animation: shake 0.5s infinite;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

.timer-count {
    font-size: 3rem;
    font-weight: 900;
    color: #d4af37;
    text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
}

.timer-label {
    font-size: 1rem;
    color: #c0a060;
    margin-top: 8px;
    font-weight: 500;
}

/* ===== INPUT ===== */
.verse-input {
    width: 100%;
    background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border: 2px solid rgba(212, 175, 55, 0.3);
    border-radius: 18px;
    padding: 22px;
    color: #f0e6d2;
    font-family: 'Amiri', serif;
    font-size: 1.3rem;
    line-height: 2.2;
    resize: none;
    transition: all 0.3s;
    direction: rtl;
}

.verse-input:focus {
    outline: none;
    border-color: #d4af37;
    box-shadow: 0 0 25px rgba(212, 175, 55, 0.2), inset 0 0 30px rgba(212, 175, 55, 0.05);
}

.verse-input::placeholder { color: #666; }

/* ===== BUTTONS ===== */
.controls {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 25px 0;
}

.btn {
    padding: 16px 40px;
    border: none;
    border-radius: 14px;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    letter-spacing: 1px;
}

.btn-primary {
    background: linear-gradient(145deg, #d4af37, #b8941f);
    color: #0a0a0a;
    box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
    border: 2px solid #d4af37;
}

.btn-primary:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 8px 35px rgba(212, 175, 55, 0.6), 0 0 60px rgba(212, 175, 55, 0.2);
    background: linear-gradient(145deg, #e5c048, #c9a32a);
}

.btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.btn-secondary {
    background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    color: #d4af37;
    border: 2px solid rgba(212, 175, 55, 0.4);
}

.btn-secondary:hover:not(:disabled) {
    background: linear-gradient(145deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05));
    border-color: #d4af37;
    box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
}

/* ===== FEEDBACK ===== */
.feedback {
    border-radius: 18px;
    padding: 25px;
    margin: 20px 0;
    display: none;
    animation: slideIn 0.6s ease;
    border: 2px solid;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(-30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.feedback.success {
    background: linear-gradient(145deg, rgba(46, 204, 113, 0.08), rgba(46, 204, 113, 0.03));
    border-color: #2ecc71;
    display: block;
    box-shadow: 0 0 30px rgba(46, 204, 113, 0.1);
}

.feedback.error {
    background: linear-gradient(145deg, rgba(231, 76, 60, 0.08), rgba(231, 76, 60, 0.03));
    border-color: #e74c3c;
    display: block;
    box-shadow: 0 0 30px rgba(231, 76, 60, 0.1);
}

.feedback-title {
    font-family: 'Reem Kufi', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.feedback.success .feedback-title { color: #2ecc71; }
.feedback.error .feedback-title { color: #e74c3c; }

.feedback-details {
    font-size: 1.1rem;
    line-height: 2;
    color: #ddd;
    font-family: 'Amiri', serif;
}

.feedback-details ul { list-style: none; padding: 0; }

.feedback-details li {
    padding: 8px 0;
    padding-right: 25px;
    position: relative;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.feedback-details li:last-child { border-bottom: none; }

.feedback-details li::before {
    content: "◆";
    position: absolute;
    right: 0;
    color: #d4af37;
    font-size: 0.8rem;
}

/* ===== STATS ===== */
.stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
    flex-wrap: wrap;
}

.stat-box {
    text-align: center;
    background: linear-gradient(145deg, rgba(212, 175, 55, 0.08), rgba(212, 175, 55, 0.02));
    padding: 20px 30px;
    border-radius: 16px;
    border: 2px solid rgba(212, 175, 55, 0.2);
    min-width: 120px;
    transition: all 0.3s;
}

.stat-box:hover {
    border-color: #d4af37;
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    transform: translateY(-3px);
}

.stat-value {
    font-size: 2.2rem;
    font-weight: 900;
    color: #d4af37;
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
}

.stat-label {
    font-size: 0.95rem;
    color: #c0a060;
    margin-top: 5px;
    font-weight: 500;
}

/* ===== PROGRESS BAR ===== */
.progress-bar {
    width: 100%;
    height: 8px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 4px;
    margin: 20px 0;
    overflow: hidden;
    border: 1px solid rgba(212, 175, 55, 0.1);
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #d4af37, #f0d878, #d4af37);
    border-radius: 4px;
    transition: width 0.5s ease;
    width: 0%;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
}

/* ===== STARS ===== */
.stars {
    text-align: center;
    font-size: 2.5rem;
    margin: 15px 0;
    letter-spacing: 8px;
}

.star { 
    color: #d4af37; 
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
    animation: starPulse 2s infinite alternate;
}

@keyframes starPulse {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

/* ===== HINT BOX ===== */
.hint-box {
    background: linear-gradient(145deg, rgba(255, 193, 7, 0.08), rgba(255, 193, 7, 0.02));
    border: 2px solid rgba(255, 193, 7, 0.3);
    border-radius: 14px;
    padding: 18px;
    margin: 15px 0;
    font-size: 1.1rem;
    color: #ffc107;
    display: none;
    font-family: 'Amiri', serif;
    line-height: 1.8;
}

/* ===== DIFFICULTY BADGE ===== */
.difficulty-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 25px;
    font-size: 0.9rem;
    font-weight: 700;
    margin-right: 10px;
    border: 2px solid;
    font-family: 'Tajawal', sans-serif;
}

.difficulty-easy { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border-color: rgba(46, 204, 113, 0.3); }
.difficulty-medium { background: rgba(255, 193, 7, 0.1); color: #ffc107; border-color: rgba(255, 193, 7, 0.3); }
.difficulty-hard { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border-color: rgba(231, 76, 60, 0.3); }

/* ===== LOADING ===== */
.loading {
    display: inline-flex;
    gap: 8px;
    align-items: center;
}

.loading span {
    width: 12px;
    height: 12px;
    background: #d4af37;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
    box-shadow: 0 0 10px #d4af37;
}

.loading span:nth-child(1) { animation-delay: 0s; }
.loading span:nth-child(2) { animation-delay: 0.2s; }
.loading span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    0%, 80%, 100% { transform: scale(1); }
    40% { transform: scale(1.5); box-shadow: 0 0 20px #d4af37; }
}

/* ===== CONFETTI ===== */
.confetti {
    position: fixed;
    width: 12px;
    height: 12px;
    top: -15px;
    animation: confettiFall 3s linear forwards;
    z-index: 1000;
    border-radius: 2px;
}

@keyframes confettiFall {
    to {
        transform: translateY(100vh) rotate(1080deg);
        opacity: 0;
    }
}

/* ===== HIDDEN ===== */
.hidden { display: none !important; }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
    .header h1 { font-size: 2.2rem; }
    .timer-grid { grid-template-columns: repeat(3, 1fr); }
    .timer-btn { font-size: 0.9rem; padding: 12px 6px; }
    .topic-text { font-size: 1.4rem; }
    .timer-circle { width: 110px; height: 110px; }
    .timer-count { font-size: 2.5rem; }
    .stats { gap: 12px; }
    .stat-box { padding: 15px 20px; min-width: 100px; }
    .btn { padding: 14px 28px; font-size: 1rem; }
    .ai-verse { font-size: 1.1rem; }
}

/* ===== DECORATIVE ELEMENTS ===== */
.gold-line {
    height: 2px;
    background: linear-gradient(90deg, transparent, #d4af37, #fff, #d4af37, transparent);
    margin: 20px 0;
    opacity: 0.5;
}

.corner-decoration {
    position: absolute;
    width: 40px;
    height: 40px;
    border: 2px solid #d4af37;
    opacity: 0.3;
}

.corner-tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
.corner-tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
.corner-bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
.corner-br { bottom: 10px; right: 10px; border-left: none; border-top: none; }
</style>
<base target="_blank">

<body>

<!-- خلفية ذهبية متحركة -->
<div class="gold-particles" id="goldParticles"></div>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <h1><span>لياقة</span> الشعر البدوي</h1>
        <p>تطبيق المحاورة الفاخر - اختبر قدراتك الشعرية</p>
    </div>

    <!-- TIMER SELECTION -->
    <div class="card">
        <div class="corner-decoration corner-tl"></div>
        <div class="corner-decoration corner-tr"></div>
        <div class="corner-decoration corner-bl"></div>
        <div class="corner-decoration corner-br"></div>
        <div class="card-title">اختر مدة التحدي</div>
        <div class="timer-grid" id="timerGrid"></div>
        <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
    </div>

    <!-- GAME AREA -->
    <div class="card" id="gameArea" style="display:none;">
        <div class="corner-decoration corner-tl"></div>
        <div class="corner-decoration corner-tr"></div>
        <div class="corner-decoration corner-bl"></div>
        <div class="corner-decoration corner-br"></div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
            <div class="card-title" style="margin:0;">الموضوع</div>
            <span class="difficulty-badge" id="diffBadge">سهل</span>
        </div>

        <div class="topic-display">
            <div class="topic-text" id="topicText">اضغط "ابدأ" لتحصل على موضوع</div>
        </div>

        <div class="ai-response" id="aiArea" style="display:none;">
            <div class="ai-label">الخصم (الذكاء الاصطناعي)</div>
            <div class="ai-verse" id="aiVerse"></div>
        </div>

        <div class="timer-circle-container">
            <div class="timer-circle" id="timerCircle">
                <div class="timer-count" id="timerDisplay">--</div>
            </div>
            <div class="timer-label" id="timerLabel">ثانية</div>
        </div>

        <div class="hint-box" id="hintBox"></div>

        <div style="margin: 25px 0;">
            <div class="card-title">رد ببيتين</div>
            <textarea class="verse-input" id="userVerse" rows="3" placeholder="اكتب بيتين شعر بدوي على الوزن والقافية..."></textarea>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startGame()">ابدأ</button>
            <button class="btn btn-secondary" id="submitBtn" onclick="submitVerse()" disabled>ارسل الرد</button>
            <button class="btn btn-secondary" id="hintBtn" onclick="showHint()" disabled>تلميح</button>
            <button class="btn btn-secondary" id="skipBtn" onclick="skipRound()" disabled>تخطي</button>
        </div>

        <div class="feedback" id="feedbackArea">
            <div class="feedback-title" id="feedbackTitle"></div>
            <div class="feedback-details" id="feedbackDetails"></div>
        </div>
    </div>

    <!-- STATS -->
    <div class="card">
        <div class="corner-decoration corner-tl"></div>
        <div class="corner-decoration corner-tr"></div>
        <div class="corner-decoration corner-bl"></div>
        <div class="corner-decoration corner-br"></div>
        <div class="card-title">إحصائياتك</div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="scoreVal">0</div>
                <div class="stat-label">النقاط</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="streakVal">0</div>
                <div class="stat-label">السلسلة</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalVal">0</div>
                <div class="stat-label">المحاولات</div>

            clearInterval(gameState.timerInterval);

    const display = document.getElementById('timerDisplay');
    const circle = document.getElementById('timerCircle');
    display.textContent = gameState.timeLeft;

    const pct = (gameState.timeLeft / gameState.selectedTime) * 100;

// ==================== إرسال الرد ====================
function submitVerse() {
    if (!gameState.isPlaying) return;

    const userText = document.getElementById('userVerse').value.trim();
    if (!userText) {
        alert('اكتب بيتين أولاً!');
        return;
    }

    clearInterval(gameState.timerInterval);
    gameState.isPlaying = false;
    gameState.total++;

    const analysis = analyzeVerse(userText, gameState.currentTopic);

    if (analysis.isCorrect) {
        const timeBonus = Math.floor(gameState.timeLeft / 5);
        const difficultyMultiplier = 
            gameState.currentTopic.difficulty === 'easy' ? 1 :
            gameState.currentTopic.difficulty === 'medium' ? 2 : 3;
        const hintPenalty = gameState.hintUsed ? 0.5 : 1;

        const points = Math.round((10 + timeBonus) * difficultyMultiplier * hintPenalty);
        gameState.score += points;
        gameState.streak++;
        if (gameState.streak > gameState.bestStreak) gameState.bestStreak = gameState.streak;

        showFeedback('success', '🎉 أحسنت! رد صحيح!', [
            'النقاط: +' + points,
            'الوقت المتبقي: ' + gameState.timeLeft + ' ثانية',
            'القافية: ' + analysis.qafiyaMatch + ' ✓',
            'الوزن: ' + analysis.waznMatch + ' ✓',
            'عدد الأبيات: ' + analysis.lineCount + ' ✓'
        ]);

        createConfetti();
    } else {
        gameState.streak = 0;
        showFeedback('error', '❌ فيه أخطاء', analysis.errors);
    }

    updateStats();
    resetControls();
}

// ==================== تحليل البيت ====================
function analyzeVerse(text, topic) {
    const lines = text.split('\n').filter(l => l.trim().length > 0);
    const errors = [];
    let isCorrect = true;

    if (lines.length < 2) {
        errors.push('يجب أن تكتب بيتين (سطرين) على الأقل');
        isCorrect = false;
    }
    if (lines.length > 2) {
        errors.push('المطلوب بيتان فقط، كتبت ' + lines.length);
        isCorrect = false;
    }

    const lastChars = lines.map(l => {
        const clean = l.replace(/[ً-ٰٟ]/g, '').trim();
        return clean.charAt(clean.length - 1);
    });

    const qafiyaMatch = lastChars.every(c => c === topic.qafiya);
    if (!qafiyaMatch) {
        errors.push('القافية غير صحيحة. القافية المطلوبة: "' + topic.qafiya + '"، لكنك انتهيت بـ: ' + lastChars.join(', '));
        isCorrect = false;
    }

    const waznMatch = checkWaznApproximate(text, topic.wazn);
    if (!waznMatch) {
        errors.push('الوزن غير متطابق. الوزن المطلوب: ' + topic.wazn);
        errors.push('مثال على الوزن: ' + getWaznExample(topic.wazn));
        isCorrect = false;
    }

    lines.forEach((line, i) => {
        const words = line.trim().split(/\s+/);
        if (words.length < 6) {
            errors.push('البيت ' + (i+1) + ' قصير جداً (يجب 6 كلمات على الأقل)');
            isCorrect = false;
        }
        if (words.length > 15) {
            errors.push('البيت ' + (i+1) + ' طويل جداً');
            isCorrect = false;
        }
    });

    return {
        isCorrect,
        errors,
        qafiyaMatch: qafiyaMatch ? 'مطابقة' : 'غير مطابقة',
        waznMatch: waznMatch ? 'مطابق' : 'غير مطابق',
        lineCount: lines.length
    };
}

function checkWaznApproximate(text, expectedWazn) {
    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) return false;

    const syllableCounts = lines.map(line => {
        let count = 0;
        const chars = line.replace(/[\s\u064B-\u065F\u0670]/g, '');
        for (let i = 0; i < chars.length; i++) {
            const c = chars[i];
            if ('اويى'.includes(c)) count++;
            else if (!'ءآأإة'.includes(c)) count++;
        }
        return count;
    });

    const avgSyllables = syllableCounts.reduce((a, b) => a + b, 0) / syllableCounts.length;

    if (expectedWazn.includes('طويل') && avgSyllables >= 22) return true;
    if (expectedWazn.includes('بسيط') && avgSyllables >= 18 && avgSyllables < 24) return true;
    if (expectedWazn.includes('متقارب') && avgSyllables >= 14 && avgSyllables < 20) return true;
    if (expectedWazn.includes('كامل') && avgSyllables >= 20 && avgSyllables < 26) return true;

    return avgSyllables >= 12;
}

function getWaznExample(wazn) {
    for (const [name, data] of Object.entries(awzanDB)) {
        if (wazn.includes(data.pattern)) return data.example;
    }
    return 'على قدرِ أهلِ العزمِ تأتي العزائمُ';
}

// ==================== التلميح ====================
function showHint() {
    if (!gameState.isPlaying || gameState.hintUsed) return;

    const hints = gameState.currentTopic.hints;
    if (gameState.hintIndex < hints.length) {
        const hintBox = document.getElementById('hintBox');
        hintBox.textContent = '💡 ' + hints[gameState.hintIndex];
        hintBox.style.display = 'block';
        gameState.hintIndex++;
        gameState.hintUsed = true;

        if (gameState.hintIndex >= hints.length) {
            document.getElementById('hintBtn').disabled = true;
        }
    }
}

        'الوزن: ' + gameState.currentTopic.wazn,
        'جرب مرة أخرى!'
    ]);

    updateStats();
    resetControls();
}

    const feedback = document.getElementById('feedbackArea');
    const titleEl = document.getElementById('feedbackTitle');
    const detailsEl = document.getElementById('feedbackDetails');

    feedback.className = 'feedback ' + type;
    titleEl.textContent = title;

    if (Array.isArray(details)) {
        detailsEl.innerHTML = '<ul>' + details.map(d => '<li>' + d + '</li>').join('') + '</ul>';
    } else {
        detailsEl.textContent = details;
    }

    feedback.style.display = 'block';
}
